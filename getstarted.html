<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>Avocado Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
          --green: #58CC02;
          --green-dark: #46A302;
          --teal: #2F9E8F;
          --bg: #FBFAF6;
          --text: #3C3C3C;
          --text-light: #85806F;
          --border: #E2DCCC;
          --card: #F0ECE1;
          --red: #FF4B4B;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--border); }
        .app-container { position: absolute; top: 0; right: 0; bottom: 0; left: 0; background-color: var(--bg); display: flex; overflow: hidden; }

        /* ── CUSTOM SCROLLBAR ── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cfc6ac; }
        * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

        /* ── LEFT SIDEBAR ── */
        .sidebar-left { width: 280px; background-color: var(--bg); border-right: 2px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; height: 100%; }
        .nav-item { padding: 15px 20px; cursor: pointer; color: var(--text); font-weight: 600; font-size: 14.5px; display: flex; align-items: center; gap: 12px; transition: background 0.2s ease, color 0.2s ease; flex-shrink: 0; }
        .nav-item svg { flex-shrink: 0; opacity: 0.75; transition: opacity 0.2s ease; }
        .nav-item:hover { background-color: var(--card); }
        .nav-item.active { background-color: var(--green); color: #fff; border-radius: 0 13px 13px 0; margin-right: 15px; }
        .nav-item.active svg { opacity: 1; }
        .content-area { flex: 1; overflow-y: auto; border-top: 2px solid var(--border); padding-top: 10px; min-height: 0; }
        .friend-card, .request-card { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s ease; flex-shrink: 0; }
        .friend-card:hover, .request-card:hover { background-color: var(--card); }
        .friend-card.active-chat { background-color: rgba(88, 204, 2, 0.14); }
        .request-actions { display: flex; gap: 8px; margin-left: auto; }
        .btn-sm { padding: 7px 14px; border: none; border-radius: 9px; cursor: pointer; font-weight: 700; font-size: 0.75rem; transition: filter 0.2s ease, transform 0.08s ease; letter-spacing: -0.1px; }
        .btn-sm:hover { filter: brightness(1.04); }
        .btn-sm:active { transform: translateY(1px) scale(0.98); }
        .btn-accept { background-color: var(--green); color: #fff; }
        .btn-reject { background-color: #fff; color: var(--red); border: 2px solid var(--border); }
        .avatar-wrap { position: relative; margin-right: 12px; flex-shrink: 0; }
        .friend-avatar { width: 40px; height: 40px; border-radius: 50%; background-color: var(--card); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--text); }
        .online-dot { position: absolute; bottom: 0px; right: 0px; width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--bg); background-color: #C9C4B4; transition: background-color 0.2s ease; }
        .online-dot.online { background-color: var(--green); }
        .friend-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
        .friend-name { font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; color: var(--text); }
        .friend-last-msg { font-size: 0.78rem; color: var(--text-light); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; line-height: 1.2; }
        .badge { background-color: var(--red); color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }
        .user-profile { padding: 15px; border-top: 2px solid var(--border); display: flex; align-items: center; background-color: var(--bg); flex-shrink: 0; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background-color: var(--green); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; margin-right: 12px; }
        .user-status { display: flex; align-items: center; font-size: 0.8rem; color: var(--text-light); font-weight: 500; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background-color: var(--green); margin-right: 5px; }

        /* ── MIDDLE PANEL ── */
        .chat-panel { flex: 1; display: flex; flex-direction: column; background-color: var(--bg); border-right: 2px solid var(--border); height: 100%; min-height: 0; overflow: hidden; }
        .chat-header { padding: 15px 20px; background-color: var(--bg); border-bottom: 2px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 10px; flex-shrink: 0; }
        .chat-header svg { opacity: 0.8; }
        .chat-header-name { font-size: 1.05rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
        .chat-header-status { font-size: 0.75rem; color: var(--text-light); font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .chat-header-dot { width: 8px; height: 8px; border-radius: 50%; background-color: #C9C4B4; }
        .chat-header-dot.online { background-color: var(--green); }
        .add-friend-area { padding: 30px; }
        .add-friend-title { font-size: 1.15rem; font-weight: 800; letter-spacing: -0.3px; margin-bottom: 5px; color: var(--text); }
        .add-friend-subtitle { font-size: 0.85rem; color: var(--text-light); font-weight: 500; margin-bottom: 15px; }
        .add-friend-input-container { display: flex; align-items: center; border: 2px solid var(--border); border-radius: 13px; padding: 5px 5px 5px 18px; background-color: var(--card); transition: border-color 0.2s ease, background-color 0.2s ease; }
        .add-friend-input-container:focus-within { border-color: var(--teal); background-color: #fff; }
        .add-friend-input { flex: 1; border: none; background: transparent; outline: none; font-size: 0.9rem; font-weight: 500; color: var(--text); }
        .add-friend-input::placeholder { color: var(--text-light); }
        .send-request-btn { background-color: var(--green); color: white; border: none; padding: 12px 22px; border-radius: 13px; cursor: pointer; font-weight: 700; font-size: 14px; letter-spacing: -0.1px; transition: filter 0.2s ease, transform 0.08s ease; flex-shrink: 0; }
        .send-request-btn:hover { filter: brightness(1.04); }
        .send-request-btn:active { transform: translateY(1px) scale(0.99); }
        #chatZone { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
        .chat-messages-container { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background-color: var(--bg); min-height: 0; }

        /* ── MESSAGES ── */
        .message-wrapper { display: flex; flex-direction: column; max-width: 70%; position: relative; }
        .message-wrapper.sent { align-self: flex-end; align-items: flex-end; }
        .message-wrapper.received { align-self: flex-start; align-items: flex-start; }
        .message { padding: 10px 15px; border-radius: 13px; font-size: 0.95rem; font-weight: 500; word-wrap: break-word; width: fit-content; cursor: pointer; user-select: none; position: relative; }
        .message-wrapper.sent .message { background-color: var(--green); color: white; border-bottom-right-radius: 4px; }
        .message-wrapper.received .message { background-color: #ffffff; color: var(--text); border-bottom-left-radius: 4px; border: 2px solid var(--border); }
        .message.deleting { opacity: 0.4; pointer-events: none; }

        /* Seen tick row */
        .msg-meta { display: flex; align-items: center; gap: 4px; margin-top: 3px; }
        .timestamp { font-size: 0.65rem; font-weight: 500; color: var(--text-light); padding: 0 2px; }
        .seen-tick { display: flex; align-items: center; }
        .seen-tick svg { width: 14px; height: 14px; }

        /* ── CONTEXT MENU ── */
        .ctx-menu {
            position: fixed;
            background: #fff;
            border: 2px solid var(--border);
            border-radius: 13px;
            box-shadow: none;
            z-index: 9999;
            min-width: 190px;
            padding: 6px 0;
            animation: menuIn 0.12s ease;
        }
        @keyframes menuIn { from { opacity:0; transform: scale(0.93); } to { opacity:1; transform: scale(1); } }
        .ctx-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 16px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text);
            transition: background 0.15s ease;
            white-space: nowrap;
        }
        .ctx-item:hover { background: var(--card); }
        .ctx-item.danger { color: var(--red); }
        .ctx-item.danger:hover { background: #FFEDED; }
        .ctx-item.disabled { color: #C9C4B4; cursor: not-allowed; pointer-events: none; }
        .ctx-item svg { flex-shrink: 0; }
        .ctx-divider { height: 1px; background: var(--border); margin: 4px 0; }
        /* Submenu */
        .ctx-submenu-wrap { position: relative; }
        .ctx-submenu {
            display: none;
            position: absolute;
            left: 100%;
            top: 0;
            background: #fff;
            border: 2px solid var(--border);
            border-radius: 13px;
            box-shadow: none;
            min-width: 200px;
            padding: 6px 0;
            z-index: 10000;
        }
        .ctx-submenu-wrap:hover .ctx-submenu { display: block; }
        .ctx-arrow { margin-left: auto; opacity: 0.4; }

        /* ── CHAT INPUT ── */
        .chat-input-area { flex-shrink: 0; padding: 15px 20px; border-top: 2px solid var(--border); background-color: var(--bg); display: flex; gap: 10px; align-items: center; }
        .chat-input-area input { flex: 1; padding: 12px 16px; border: 2px solid var(--border); border-radius: 13px; outline: none; background-color: var(--card); color: var(--text); font-size: 0.9rem; font-weight: 500; min-width: 0; height: 46px; transition: border-color 0.2s ease, background-color 0.2s ease; }
        .chat-input-area input::placeholder { color: var(--text-light); }
        .chat-input-area input:focus { border-color: var(--teal); background-color: #fff; }
        .chat-send-btn { background-color: var(--green); color: white; border: none; padding: 0 26px; border-radius: 13px; cursor: pointer; font-weight: 700; font-size: 14px; letter-spacing: -0.1px; flex-shrink: 0; height: 46px; transition: filter 0.2s ease, transform 0.08s ease; }
        .chat-send-btn:hover { filter: brightness(1.04); }
        .chat-send-btn:active { transform: translateY(1px) scale(0.99); }

        /* ── RIGHT SIDEBAR ── */
        .sidebar-right { width: 250px; background-color: var(--bg); padding: 20px; flex-shrink: 0; height: 100%; overflow-y: auto; }
        .sidebar-right-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-light); margin-bottom: 15px; }
        .no-friends-card { background-color: var(--card); border-radius: 13px; padding: 20px; text-align: center; color: var(--text); }
        .no-friends-card h4 { margin-bottom: 5px; font-weight: 700; }
        .no-friends-card p { font-size: 0.8rem; font-weight: 500; color: var(--text-light); }
        .online-friend-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
        .online-friend-item:last-child { border-bottom: none; }

        #addFriendZone { flex-shrink: 0; }
        #pendingZone { flex: 1; min-height: 0; overflow-y: auto; }

        /* Toast notification */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--text); color: #fff; padding: 9px 20px; border-radius: 13px;
            font-size: 0.82rem; font-weight: 600; z-index: 99999; opacity: 0;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>

function showToast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), 2000);
}

// ================================================================
// AUTH

async function checkAuthAndLoad() {
    const { data: { session } } = await _supabase.auth.getSession();
    if (!session) { window.location.href = 'index.html'; return; }
    currentUserId = session.user.id;
    const { data: profile } = await _supabase.from('profiles').select('username').eq('id', currentUserId).single();
    if (profile) {
        currentUserUsername = profile.username;
        currentUserName.innerText = currentUserUsername;
        currentUserAvatar.innerText = currentUserUsername.charAt(0).toUpperCase();
    }
    await loadFriends();
    setupPresence();
    setupFriendsSubscription(); // ← NEW
}

// ================================================================
// PRESENCE
// ================================================================
function setupPresence() {
    presenceChannel = _supabase.channel('online-users', { config: { presence: { key: currentUserId } } });
    presenceChannel
        .on('presence', { event: 'sync' }, () => {
            onlineUserIds = new Set(Object.keys(presenceChannel.presenceState()));
            renderFriendsList(); renderOnlineSidebar(); updateChatHeader();
        })
        .on('presence', { event: 'join' }, ({ key }) => {
            onlineUserIds.add(key); renderFriendsList(); renderOnlineSidebar(); updateChatHeader();
        })
        .on('presence', { event: 'leave' }, ({ key }) => {
            onlineUserIds.delete(key); renderFriendsList(); renderOnlineSidebar(); updateChatHeader();
        })
        .subscribe(async (status) => {
            if (status === 'SUBSCRIBED') {
                await presenceChannel.track({ user_id: currentUserId, online_at: new Date().toISOString() });
            }
        });
}
function isOnline(userId) { return onlineUserIds.has(userId); }

// ================================================================
// FRIENDS REALTIME SUBSCRIPTION
// Watches the friends table for rows where friend_id = currentUserId
// so that when someone's request is accepted (INSERT of reciprocal row)
// this user's sidebar updates immediately without a page refresh.
// ================================================================
function setupFriendsSubscription() {
    if (friendsSubscription) { _supabase.removeChannel(friendsSubscription); }

    friendsSubscription = _supabase
        .channel(`friends-for-${currentUserId}`)
        .on(
            'postgres_changes',
            {
                event: 'INSERT',
                schema: 'public',
                table: 'friends',
                // Only care about rows where I am the friend_id (i.e. someone added me)
                filter: `friend_id=eq.${currentUserId}`
            },
            async (payload) => {
                const row = payload.new;
                // If a new accepted friendship row appeared for us, reload the friends list
                if (row.status === 'accepted') {
                    await loadFriends();
                    showToast('A new friend appeared!');
                }
            }
        )
        .on(
            'postgres_changes',
            {
                event: 'UPDATE',
                schema: 'public',
                table: 'friends',
                // Also watch rows where I am user_id — so if the original request row
                // gets its status updated to accepted, my list reloads too.
                filter: `user_id=eq.${currentUserId}`
            },
            async (payload) => {
                const row = payload.new;
                if (row.status === 'accepted') {
                    // The person we sent a request to accepted it — reload friends
                    const alreadyInList = friends.some(f => f.id === row.friend_id);
                    if (!alreadyInList) {
                        await loadFriends();
                        showToast('Your friend request was accepted!');
                    }
                }
            }
        )
        .subscribe();
}

}

// ================================================================
// FRIENDS LIST
// ================================================================
async function loadFriends() {
    const { data: fr, error: fError } = await _supabase
        .from('friends')
        .select('friend_id')
        .eq('user_id', currentUserId)
        .eq('status', 'accepted');

    if (fError) { console.error(fError); return; }
    if (!fr || fr.length === 0) {
        friendsList.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-light);font-weight:500;">No friends yet.<br>Add one above!</div>`;
        friends = []; renderOnlineSidebar(); return;
    }
    const ids = fr.map(r => r.friend_id);
    const { data: profiles } = await _supabase.from('profiles').select('id, username').in('id', ids);

    // Preserve unread counts for friends already in list
    const unreadMap = {};
    friends.forEach(f => { unreadMap[f.id] = f.unread || 0; });

    friends = profiles.map(p => ({
        id: p.id,
        name: p.username,
        unread: unreadMap[p.id] || 0,
        lastMsg: null,
        lastSender: null
    }));
    await populateLastMessages();
    renderFriendsList();
    renderOnlineSidebar();
}

async function populateLastMessages() {
    await Promise.all(friends.map(async (f) => {
        const { data: msgs } = await _supabase.from('messages').select('sender_id, content, created_at')
            .or(`and(sender_id.eq.${currentUserId},receiver_id.eq.${f.id}),and(sender_id.eq.${f.id},receiver_id.eq.${currentUserId})`)
            .order('created_at', { ascending: false }).limit(1);
        if (msgs && msgs.length > 0) { f.lastMsg = msgs[0].content; f.lastSender = msgs[0].sender_id; }
    }));
}

function renderFriendsList() {
    friendsList.innerHTML = '';
    if (friends.length === 0) {
        friendsList.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-light);font-weight:500;">No friends yet.<br>Add one above!</div>`;
        return;
    }
    friends.forEach(friend => {
        const card = document.createElement('div');
        card.className = `friend-card ${currentChatId === friend.id ? 'active-chat' : ''}`;
        card.onclick = () => openChat(friend.id);
        const avatarWrap = document.createElement('div');
        avatarWrap.className = 'avatar-wrap';
        const av = document.createElement('div');
        av.className = 'friend-avatar';
        av.innerText = friend.name.charAt(0).toUpperCase();
        const dot = document.createElement('div');
        dot.className = 'online-dot' + (isOnline(friend.id) ? ' online' : '');
        avatarWrap.appendChild(av); avatarWrap.appendChild(dot);
        const info = document.createElement('div'); info.className = 'friend-info';
        const nm = document.createElement('div'); nm.className = 'friend-name'; nm.innerText = friend.name;
        const pv = document.createElement('div'); pv.className = 'friend-last-msg';
        if (friend.lastMsg) { pv.innerText = (friend.lastSender === currentUserId ? 'You: ' : `${friend.name}: `) + friend.lastMsg; }
        else { pv.innerText = 'Start chatting...'; }
        info.appendChild(nm); info.appendChild(pv);
        card.appendChild(avatarWrap); card.appendChild(info);
        if (friend.unread > 0) {
            const badge = document.createElement('div'); badge.className = 'badge'; badge.innerText = friend.unread;
            card.appendChild(badge);
        }
        friendsList.appendChild(card);
    });
}

function renderOnlineSidebar() {
    const online = friends.filter(f => isOnline(f.id));
    if (online.length === 0) {
        onlineFriendsList.innerHTML = `<div class="no-friends-card"><h4>Its so quiet here</h4><p>I can even hear grasshopper chirping</p></div>`;
        return;
    }
    onlineFriendsList.innerHTML = '';
    online.forEach(f => {
        const item = document.createElement('div');
        item.className = 'online-friend-item';
        item.onclick = () => openChat(f.id);
        item.innerHTML = `
            <div style="width:34px;height:34px;border-radius:50%;background:var(--card);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--text);font-size:0.85rem;flex-shrink:0;">${f.name.charAt(0).toUpperCase()}</div>
            <div style="font-size:0.85rem;font-weight:600;color:var(--text);">${f.name}</div>
            <div style="margin-left:auto;width:9px;height:9px;border-radius:50%;background:var(--green);flex-shrink:0;"></div>`;
        onlineFriendsList.appendChild(item);
    });
}

function updateChatHeader() {
    if (!currentChatId) return;
    const friend = friends.find(f => f.id === currentChatId);
    if (!friend) return;
    const online = isOnline(currentChatId);
    chatHeader.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">
        <span class="chat-header-name">${HEADER_ICON_PERSON}${friend.name}</span>
        <span class="chat-header-status"><span class="chat-header-dot ${online ? 'online' : ''}"></span>${online ? 'Online' : 'Offline'}</span>
    </div>`;
}

// ================================================================
// ADD FRIEND
// ================================================================
async function addNewFriend() {
    const username = friendInput.value.trim();
    friendError.style.display = 'none';
    if (!username) { friendError.innerText = "Please enter a username."; friendError.style.display = 'block'; return; }
    const { data: targetUser } = await _supabase.from('profiles').select('id').eq('username', username).maybeSingle();
    if (!targetUser) { friendError.innerText = "User not found."; friendError.style.display = 'block'; return; }
    if (targetUser.id === currentUserId) { friendError.innerText = "You cannot add yourself."; friendError.style.display = 'block'; return; }
    const { data: existing } = await _supabase.from('friends').select('id').eq('user_id', currentUserId).eq('friend_id', targetUser.id).maybeSingle();
    if (existing) { friendError.innerText = "Friend already added."; friendError.style.display = 'block'; return; }
    const { error } = await _supabase.from('friends').insert({ user_id: currentUserId, friend_id: targetUser.id, status: 'pending' });
    if (error) { friendError.innerText = "Error adding friend."; friendError.style.display = 'block'; return; }
    friendInput.value = '';
    showToast("Friend request sent!");
}

// ================================================================
// PENDING REQUESTS
// ================================================================
async function loadPendingRequests() {
    pendingList.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-light);font-weight:500;">Loading...</div>';
    const { data: requests } = await _supabase.from('friends').select('user_id').eq('friend_id', currentUserId).eq('status', 'pending');
    if (!requests || requests.length === 0) {
        pendingList.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-light);font-weight:500;">No pending requests.</div>';
        return;
    }
    const ids = requests.map(r => r.user_id);
    const { data: profiles } = await _supabase.from('profiles').select('id, username').in('id', ids);
    pendingList.innerHTML = '';
    profiles.forEach(p => {
        const card = document.createElement('div');
        card.className = 'request-card';
        card.innerHTML = `
            <div class="friend-avatar">${p.username.charAt(0).toUpperCase()}</div>
            <div class="friend-info"><div class="friend-name">${p.username}</div></div>
            <div class="request-actions">
                <button class="btn-sm btn-accept" onclick="respondToRequest('${p.id}','accepted')">Accept</button>
                <button class="btn-sm btn-reject" onclick="respondToRequest('${p.id}','rejected')">Reject</button>
            </div>`;
        pendingList.appendChild(card);
    });
}

// ================================================================
// RESPOND TO FRIEND REQUEST — THE CORE FIX
//
// Old code only updated the original row's status to 'accepted'.
// That meant:
//   • The sender (user_id) had a row: user_id=A, friend_id=B, status='accepted'  ✓
//   • The receiver (friend_id=B) had NO row with user_id=B → B never saw A
//
// Fix: when accepting, also INSERT a reciprocal row so both sides
// have an 'accepted' friendship row pointing at each other.
// The realtime subscription on friend_id picks this up for User A
// (the original sender) and reloads their sidebar automatically.
// ================================================================
async function respondToRequest(requesterId, status) {
    if (status === 'accepted') {
        // 1. Update the original pending row to 'accepted'
        const { error: updateError } = await _supabase
            .from('friends')
            .update({ status: 'accepted' })
            .eq('user_id', requesterId)
            .eq('friend_id', currentUserId);

        if (updateError) {
            console.error('Error accepting request:', updateError);
            showToast('Could not accept request');
            return;
        }

        // 2. Insert the reciprocal row so the current user also has the friendship
        //    Use upsert to avoid duplicate key errors if somehow re-accepted.
        const { error: insertError } = await _supabase
            .from('friends')
            .upsert(
                { user_id: currentUserId, friend_id: requesterId, status: 'accepted' },
                { onConflict: 'user_id,friend_id' }
            );

        if (insertError) {
            console.error('Error creating reciprocal friendship:', insertError);
            // Non-fatal: the update succeeded; log but continue
        }

        // 3. Reload this user's friends list immediately
        await loadFriends();
        showToast('Friend added!');

    } else {
        // Rejected: just update status
        await _supabase
            .from('friends')
            .update({ status: 'rejected' })
            .eq('user_id', requesterId)
            .eq('friend_id', currentUserId);
    }

    // Refresh pending list UI
    loadPendingRequests();
}

// ================================================================
// CHAT OPEN
// ================================================================
async function openChat(friendId) {
    currentChatId = friendId;
    const friend = friends.find(f => f.id === friendId);
    if (friend) friend.unread = 0;
    addFriendZone.style.display = 'none';
    chatZone.style.display = 'flex';
    pendingZone.style.display = 'none';
    updateChatHeader();
    renderFriendsList();
    await loadMessages(friendId);
    if (messageSubscription) { _supabase.removeChannel(messageSubscription); }
    subscribeToNewMessages(friendId);
}

// ================================================================
// LOAD & RENDER MESSAGES
// ================================================================
async function loadMessages(friendId) {
    messageContainer.innerHTML = '<div style="text-align:center;color:var(--text-light);font-weight:500;margin-top:20px;">Loading messages...</div>';
    const { data: messages, error } = await _supabase.from('messages').select('*')
        .or(`and(sender_id.eq.${currentUserId},receiver_id.eq.${friendId}),and(sender_id.eq.${friendId},receiver_id.eq.${currentUserId})`)
        .order('created_at', { ascending: true });
    if (error) { messageContainer.innerHTML = '<div style="text-align:center;color:var(--red);font-weight:600;">Error loading chat.</div>'; return; }

    const unseen = (messages || []).filter(m => m.sender_id === friendId && !m.seen_at);
    if (unseen.length > 0) {
        await _supabase.from('messages').update({ seen_at: new Date().toISOString() })
            .in('id', unseen.map(m => m.id));
        unseen.forEach(m => m.seen_at = new Date().toISOString());
    }

    messageContainer.innerHTML = '';
    if (!messages || messages.length === 0) {
        messageContainer.innerHTML = '<div style="text-align:center;color:var(--text-light);font-weight:500;margin-top:20px;">No messages yet. Say hi!</div>';
        return;
    }
    messages.forEach(msg => appendMessageToDOM(msg));
    messageContainer.scrollTop = messageContainer.scrollHeight;
}

function appendMessageToDOM(msg, prepend = false) {
    const isSent = msg.sender_id === currentUserId;
    const isSeen = !!msg.seen_at;

    const wrapper = document.createElement('div');
    wrapper.className = `message-wrapper ${isSent ? 'sent' : 'received'}`;
    wrapper.dataset.msgId = msg.id || '';
    wrapper.dataset.isSent = isSent ? '1' : '0';
    wrapper.dataset.seen = isSeen ? '1' : '0';
    wrapper.dataset.content = msg.content;

    const msgDiv = document.createElement('div');
    msgDiv.className = 'message';
    msgDiv.innerText = msg.content;

    if (isSent) {
        msgDiv.addEventListener('contextmenu', (e) => { e.preventDefault(); showCtxMenu(e, wrapper); });
        msgDiv.addEventListener('click', (e) => { showCtxMenu(e, wrapper); });
    }

    wrapper.appendChild(msgDiv);

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    const ts = document.createElement('span');
    ts.className = 'timestamp';
    ts.innerText = new Date(msg.created_at || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    meta.appendChild(ts);

    if (isSent) {
        const tick = document.createElement('span');
        tick.className = 'seen-tick';
        tick.innerHTML = isSeen ? ICONS.checkDouble : ICONS.checkDoubleGrey;
        tick.title = isSeen ? 'Seen' : 'Delivered';
        meta.appendChild(tick);
    }

    wrapper.appendChild(meta);

    if (prepend) { messageContainer.insertBefore(wrapper, messageContainer.firstChild); }
    else { messageContainer.appendChild(wrapper); }
}

// ================================================================
// CONTEXT MENU
// ================================================================
function showCtxMenu(e, wrapper) {
    e.stopPropagation();
    closeCtxMenu();

    const msgId  = wrapper.dataset.msgId;
    const isSeen = wrapper.dataset.seen === '1';
    const content = wrapper.dataset.content;

    ctxMenu.innerHTML = `
        <div class="ctx-item" id="ctx-copy">${ICONS.copy} Copy</div>
        <div class="ctx-divider"></div>
        <div class="ctx-item danger" id="ctx-delete">${ICONS.trash} Delete</div>
        <div class="ctx-item danger ${isSeen ? 'disabled' : ''}" id="ctx-delete-viewed" title="${isSeen ? 'Already seen by recipient' : 'Delete when recipient views it'}">
            ${isSeen ? ICONS.eyeOff : ICONS.eye} Delete after viewed ${isSeen ? '<span style="font-size:0.75rem;color:#C9C4B4;margin-left:4px;">(already seen)</span>' : ''}
        </div>
        <div class="ctx-submenu-wrap">
            <div class="ctx-item danger" id="ctx-delete-timer">
                ${ICONS.clock} Delete after…<span class="ctx-arrow">${ICONS.chevronRight}</span>
            </div>
            <div class="ctx-submenu" id="ctx-submenu">
                <div class="ctx-item danger" onclick="scheduleDelete('${msgId}', 5)">${ICONS.clock} 5 minutes</div>
                <div class="ctx-item danger" onclick="scheduleDelete('${msgId}', 10)">${ICONS.clock} 10 minutes</div>
                <div class="ctx-item danger" onclick="scheduleDelete('${msgId}', 15)">${ICONS.clock} 15 minutes</div>
            </div>
        </div>`;

    ctxMenu.querySelector('#ctx-copy').onclick = () => { navigator.clipboard.writeText(content); showToast('Copied!'); closeCtxMenu(); };
    ctxMenu.querySelector('#ctx-delete').onclick = () => { deleteMessage(msgId); closeCtxMenu(); };
    if (!isSeen) {
        ctxMenu.querySelector('#ctx-delete-viewed').onclick = () => { registerDeleteOnView(msgId); showToast('Will delete when seen'); closeCtxMenu(); };
    }

    const x = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 200);
    const y = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 200);
    ctxMenu.style.display = 'block';
    const mw = ctxMenu.offsetWidth || 200;
    const mh = ctxMenu.offsetHeight || 160;
    ctxMenu.style.left = (x + mw > window.innerWidth ? x - mw : x) + 'px';
    ctxMenu.style.top  = (y + mh > window.innerHeight ? y - mh : y) + 'px';
}

function closeCtxMenu() { ctxMenu.style.display = 'none'; ctxMenu.innerHTML = ''; }
document.addEventListener('click', closeCtxMenu);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeCtxMenu(); });

// ================================================================
// DELETE MESSAGE
// ================================================================
async function deleteMessage(msgId) {
    if (!msgId) return;
    const wrapper = document.querySelector(`[data-msg-id="${msgId}"]`);
    if (wrapper) { wrapper.querySelector('.message').classList.add('deleting'); }
    if (deleteTimers[msgId]) { clearTimeout(deleteTimers[msgId]); delete deleteTimers[msgId]; }
    const { error } = await _supabase.from('messages').delete().eq('id', msgId).eq('sender_id', currentUserId);
    if (error) { console.error('Delete error', error); showToast('Could not delete'); if (wrapper) wrapper.querySelector('.message').classList.remove('deleting'); return; }
    if (wrapper) wrapper.remove();
    showToast('Message deleted');
}

function scheduleDelete(msgId, minutes) {
    closeCtxMenu();
    if (!msgId) return;
    if (deleteTimers[msgId]) { clearTimeout(deleteTimers[msgId]); }
    deleteTimers[msgId] = setTimeout(() => deleteMessage(msgId), minutes * 60 * 1000);
    showToast(`Will delete in ${minutes} min`);
}

function registerDeleteOnView(msgId) {
    if (!msgId) return;
    deleteOnViewSet.add(msgId);
}

// ================================================================
// REALTIME SUBSCRIPTION (messages)
// ================================================================
function subscribeToNewMessages(friendId) {
    const channelName = `chat-${[currentUserId, friendId].sort().join('-')}`;
    messageSubscription = _supabase.channel(channelName)
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, async (payload) => {
            const msg = payload.new;
            const relevant = (
                (msg.sender_id === currentUserId && msg.receiver_id === friendId) ||
                (msg.sender_id === friendId && msg.receiver_id === currentUserId)
            );
            if (!relevant || msg.sender_id === currentUserId) return;

            if (currentChatId === friendId) {
                await _supabase.from('messages').update({ seen_at: new Date().toISOString() }).eq('id', msg.id);
                msg.seen_at = new Date().toISOString();
                appendMessageToDOM(msg);
                messageContainer.scrollTop = messageContainer.scrollHeight;
            } else {
                const f = friends.find(x => x.id === friendId);
                if (f) { f.unread += 1; f.lastMsg = msg.content; f.lastSender = msg.sender_id; renderFriendsList(); }
            }
        })
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'messages' }, (payload) => {
            const msg = payload.new;
            if (msg.sender_id === currentUserId && msg.seen_at) {
                const wrapper = document.querySelector(`[data-msg-id="${msg.id}"]`);
                if (wrapper) {
                    wrapper.dataset.seen = '1';
                    const tick = wrapper.querySelector('.seen-tick');
                    if (tick) { tick.innerHTML = ICONS.checkDouble; tick.title = 'Seen'; }
                }
                if (deleteOnViewSet.has(msg.id)) { deleteOnViewSet.delete(msg.id); deleteMessage(msg.id); }
            }
        })
        .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, (payload) => {
            const wrapper = document.querySelector(`[data-msg-id="${payload.old.id}"]`);
            if (wrapper) wrapper.remove();
        })
        .subscribe();
}

// ================================================================
// SEND MESSAGE
// ================================================================
async function sendMessage() {
    if (!currentChatId) return;
    const text = messageInput.value.trim();
    if (!text) return;

    const tempId = 'temp_' + Date.now();
    const optimistic = { id: tempId, sender_id: currentUserId, receiver_id: currentChatId, content: text, created_at: new Date().toISOString(), seen_at: null };
    appendMessageToDOM(optimistic);
    messageContainer.scrollTop = messageContainer.scrollHeight;
    messageInput.value = '';

    const friend = friends.find(f => f.id === currentChatId);
    if (friend) { friend.lastMsg = text; friend.lastSender = currentUserId; renderFriendsList(); }

    const { data, error } = await _supabase.from('messages').insert({ sender_id: currentUserId, receiver_id: currentChatId, content: text }).select().single();
    if (error) { console.error(error); showToast('Failed to send'); return; }

    const wrapper = document.querySelector(`[data-msg-id="${tempId}"]`);
    if (wrapper && data) { wrapper.dataset.msgId = data.id; }
}

function handleKeyPress(e) { if (e.key === 'Enter') sendMessage(); }

document.addEventListener('DOMContentLoaded', checkAuthAndLoad);
</script>
</body>
</html>
