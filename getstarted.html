<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
    <title>Avocado Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- OneSignal Web SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function (OneSignal) {
            await OneSignal.init({
                appId: "cb60c6c8-6042-4c55-83c5-73973319b011",
                serviceWorkerPath: "avacado-chat/OneSignalSDKWorker.js",
                serviceWorkerParam: { scope: "/avacado-chat/" },
            });
        });
    </script>
    <style>
        :root {
          --green: #58CC02;
          --green-dark: #46A302;
          --teal: #2F9E8F;
          --bg: #FBFAF6;
          --text: #3C3C3C;
          --text-light: #85806F;
          --border: #E2DCCC;
          --card: #F0ECE1;
          --red: #FF4B4B;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        html, body { height: 100%; width: 100%; margin: 0; padding: 0; overflow: hidden; background-color: var(--border); }
        .app-container { position: absolute; top: 0; right: 0; bottom: 0; left: 0; background-color: var(--bg); display: flex; overflow: hidden; }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cfc6ac; }
        * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

        .sidebar-left { width: 280px; background-color: var(--bg); border-right: 2px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; height: 100%; }
        .nav-item { padding: 15px 20px; cursor: pointer; color: var(--text); font-weight: 600; font-size: 14.5px; display: flex; align-items: center; gap: 12px; transition: background 0.2s ease, color 0.2s ease; flex-shrink: 0; }
        .nav-item svg { flex-shrink: 0; opacity: 0.75; transition: opacity 0.2s ease; }
        .nav-item:hover { background-color: var(--card); }
        .nav-item.active { background-color: var(--green); color: #fff; border-radius: 0 13px 13px 0; margin-right: 15px; }
        .nav-item.active svg { opacity: 1; }
        .content-area { flex: 1; overflow-y: auto; border-top: 2px solid var(--border); padding-top: 10px; min-height: 0; }
        .friend-card, .request-card { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.2s ease; flex-shrink: 0; }
        .friend-card:hover, .request-card:hover { background-color: var(--card); }
        .friend-card.active-chat { background-color: rgba(88, 204, 2, 0.14); }
        .request-actions { display: flex; gap: 8px; margin-left: auto; }
        .btn-sm { padding: 7px 14px; border: none; border-radius: 9px; cursor: pointer; font-weight: 700; font-size: 0.75rem; transition: filter 0.2s ease, transform 0.08s ease; letter-spacing: -0.1px; }
        .btn-sm:hover { filter: brightness(1.04); }
        .btn-sm:active { transform: translateY(1px) scale(0.98); }
        .btn-accept { background-color: var(--green); color: #fff; }
        .btn-reject { background-color: #fff; color: var(--red); border: 2px solid var(--border); }
        .avatar-wrap { position: relative; margin-right: 12px; flex-shrink: 0; }
        .friend-avatar { width: 40px; height: 40px; border-radius: 50%; background-color: var(--card); border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--text); }
        .online-dot { position: absolute; bottom: 0px; right: 0px; width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--bg); background-color: #C9C4B4; transition: background-color 0.2s ease; }
        .online-dot.online { background-color: var(--green); }
        .friend-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
        .friend-name { font-weight: 700; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; color: var(--text); }
        .friend-last-msg { font-size: 0.78rem; color: var(--text-light); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; line-height: 1.2; }
        .badge { background-color: var(--red); color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }
        .user-profile { padding: 15px; border-top: 2px solid var(--border); display: flex; align-items: center; background-color: var(--bg); flex-shrink: 0; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background-color: var(--green); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; margin-right: 12px; }
        .user-status { display: flex; align-items: center; font-size: 0.8rem; color: var(--text-light); font-weight: 500; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background-color: var(--green); margin-right: 5px; }

        .chat-panel { flex: 1; display: flex; flex-direction: column; background-color: var(--bg); border-right: 2px solid var(--border); height: 100%; min-height: 0; overflow: hidden; }
        .chat-header { padding: 15px 20px; background-color: var(--bg); border-bottom: 2px solid var(--border); display: flex; align-items: center; justify-content: center; gap: 10px; flex-shrink: 0; }
        .chat-header svg { opacity: 0.8; }
        .chat-header-name { font-size: 1.05rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
        .chat-header-status { font-size: 0.75rem; color: var(--text-light); font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .chat-header-dot { width: 8px; height: 8px; border-radius: 50%; background-color: #C9C4B4; }
        .chat-header-dot.online { background-color: var(--green); }
        .add-friend-area { padding: 30px; }
        .add-friend-title { font-size: 1.15rem; font-weight: 800; letter-spacing: -0.3px; margin-bottom: 5px; color: var(--text); }
        .add-friend-subtitle { font-size: 0.85rem; color: var(--text-light); font-weight: 500; margin-bottom: 15px; }
        .add-friend-input-container { display: flex; align-items: center; border: 2px solid var(--border); border-radius: 13px; padding: 5px 5px 5px 18px; background-color: var(--card); transition: border-color 0.2s ease, background-color 0.2s ease; }
        .add-friend-input-container:focus-within { border-color: var(--teal); background-color: #fff; }
        .add-friend-input { flex: 1; border: none; background: transparent; outline: none; font-size: 0.9rem; font-weight: 500; color: var(--text); }
        .add-friend-input::placeholder { color: var(--text-light); }
        .send-request-btn { background-color: var(--green); color: white; border: none; padding: 12px 22px; border-radius: 13px; cursor: pointer; font-weight: 700; font-size: 14px; letter-spacing: -0.1px; transition: filter 0.2s ease, transform 0.08s ease; flex-shrink: 0; }
        .send-request-btn:hover { filter: brightness(1.04); }
        .send-request-btn:active { transform: translateY(1px) scale(0.99); }
        #chatZone { flex: 1; display: flex; flex-direction: column; min-height: 0; overflow: hidden; position: relative; }
        .chat-messages-container { flex: 1; padding: 20px; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; gap: 8px; background-color: var(--bg); min-height: 0; }

        .mention-dropdown {
            position: absolute; left: 20px; right: 20px; bottom: 78px; max-width: 320px;
            background: #fff; border: 2px solid var(--border); border-radius: 13px; overflow: hidden;
            z-index: 500; box-shadow: 0 10px 28px rgba(60,60,60,0.10); animation: mentionIn 0.12s ease;
        }
        @keyframes mentionIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .mention-dropdown-label { padding: 8px 14px 4px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-light); }
        .mention-dropdown-item { display: flex; align-items: center; gap: 10px; padding: 9px 14px; cursor: pointer; transition: background 0.12s ease; }
        .mention-dropdown-item:hover, .mention-dropdown-item.active { background-color: var(--card); }
        .mention-dropdown-avatar { width: 30px; height: 30px; border-radius: 50%; background-color: var(--green); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.78rem; flex-shrink: 0; }
        .mention-dropdown-name { font-weight: 700; font-size: 0.87rem; color: var(--text); }
        .mention-dropdown-hint { margin-left: auto; font-size: 0.68rem; color: var(--text-light); font-weight: 600; }

        .mention-pill { background-color: rgba(88, 204, 2, 0.20); color: var(--green-dark); font-weight: 700; padding: 1px 6px; border-radius: 6px; }
        .message-wrapper.sent .message .mention-pill { background-color: rgba(255, 255, 255, 0.28); color: #fff; }

        /* ── MESSAGES ──
           overflow-wrap: anywhere + word-break: break-word are the fix for
           long unbroken runs of characters (e.g. "aaaaaaaaaaaaaaaaaaaaaa")
           that have no natural space to wrap at — without these, such a
           run refuses to wrap and pushes the bubble past its max-width and
           off the edge of the screen. white-space: pre-wrap preserves
           intentional line breaks typed with Shift+Enter. */
        .message-wrapper { display: flex; flex-direction: column; max-width: 70%; min-width: 0; position: relative; }
        .message-wrapper.sent { align-self: flex-end; align-items: flex-end; }
        .message-wrapper.received { align-self: flex-start; align-items: flex-start; }
        .message {
            padding: 10px 15px;
            border-radius: 13px;
            font-size: 0.95rem;
            font-weight: 500;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            word-break: break-word;
            max-width: 100%;
            width: fit-content;
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        .message-wrapper.sent .message { background-color: var(--green); color: white; border-bottom-right-radius: 4px; }
        .message-wrapper.received .message { background-color: #ffffff; color: var(--text); border-bottom-left-radius: 4px; border: 2px solid var(--border); }
        .message.deleting { opacity: 0.4; pointer-events: none; }

        .msg-meta { display: flex; align-items: center; gap: 4px; margin-top: 3px; }
        .timestamp { font-size: 0.65rem; font-weight: 500; color: var(--text-light); padding: 0 2px; }
        .seen-tick { display: flex; align-items: center; }
        .seen-tick svg { width: 14px; height: 14px; }

        .ctx-menu { position: fixed; background: #fff; border: 2px solid var(--border); border-radius: 13px; box-shadow: none; z-index: 9999; min-width: 190px; padding: 6px 0; animation: menuIn 0.12s ease; }
        @keyframes menuIn { from { opacity:0; transform: scale(0.93); } to { opacity:1; transform: scale(1); } }
        .ctx-item { display: flex; align-items: center; gap: 10px; padding: 9px 16px; font-size: 0.88rem; font-weight: 600; cursor: pointer; color: var(--text); transition: background 0.15s ease; white-space: nowrap; }
        .ctx-item:hover { background: var(--card); }
        .ctx-item.danger { color: var(--red); }
        .ctx-item.danger:hover { background: #FFEDED; }
        .ctx-item.disabled { color: #C9C4B4; cursor: not-allowed; pointer-events: none; }
        .ctx-item svg { flex-shrink: 0; }
        .ctx-divider { height: 1px; background: var(--border); margin: 4px 0; }
        .ctx-submenu-wrap { position: relative; }
        .ctx-submenu { display: none; position: absolute; left: 100%; top: 0; background: #fff; border: 2px solid var(--border); border-radius: 13px; box-shadow: none; min-width: 200px; padding: 6px 0; z-index: 10000; }
        .ctx-submenu-wrap:hover .ctx-submenu { display: block; }
        .ctx-arrow { margin-left: auto; opacity: 0.4; }

        /* ── CHAT INPUT ── */
        .chat-input-area { flex-shrink: 0; padding: 15px 20px; border-top: 2px solid var(--border); background-color: var(--bg); display: flex; gap: 10px; align-items: flex-end; }

        .message-input-wrap { position: relative; flex: 1; min-width: 0; }

        .chat-input-area textarea#messageInput {
            display: block;
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 13px;
            outline: none;
            background-color: var(--card);
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 500;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.45;
            /* Same wrap fix as message bubbles — long unbroken text must
               wrap inside the box instead of scrolling past its edge. */
            overflow-wrap: anywhere;
            word-break: break-word;
            min-width: 0;
            height: 46px;
            resize: none;
            overflow-y: hidden;
            transition: border-color 0.2s ease, background-color 0.2s ease;
        }
        .chat-input-area textarea#messageInput::placeholder { color: var(--text-light); }
        .chat-input-area textarea#messageInput:focus { border-color: var(--teal); background-color: #fff; }

        .expand-toggle {
            display: none;
            position: absolute;
            top: -30px;
            right: 4px;
            background-color: #fff;
            border: 2px solid var(--border);
            color: var(--text-light);
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            padding: 5px 12px;
            border-radius: 9px;
            cursor: pointer;
            transition: border-color 0.15s ease, color 0.15s ease;
            z-index: 30;
        }
        .expand-toggle:hover { border-color: var(--teal); color: var(--teal); }

        .chat-send-btn { background-color: var(--green); color: white; border: none; padding: 0 26px; border-radius: 13px; cursor: pointer; font-weight: 700; font-size: 14px; letter-spacing: -0.1px; flex-shrink: 0; height: 46px; transition: filter 0.2s ease, transform 0.08s ease; }
        .chat-send-btn:hover { filter: brightness(1.04); }
        .chat-send-btn:active { transform: translateY(1px) scale(0.99); }

        .sidebar-right { width: 250px; background-color: var(--bg); padding: 20px; flex-shrink: 0; height: 100%; overflow-y: auto; }
        .sidebar-right-title { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-light); margin-bottom: 15px; }
        .no-friends-card { background-color: var(--card); border-radius: 13px; padding: 20px; text-align: center; color: var(--text); }
        .no-friends-card h4 { margin-bottom: 5px; font-weight: 700; }
        .no-friends-card p { font-size: 0.8rem; font-weight: 500; color: var(--text-light); }
        .online-friend-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
        .online-friend-item:last-child { border-bottom: none; }

        #addFriendZone { flex-shrink: 0; }
        #pendingZone { flex: 1; min-height: 0; overflow-y: auto; }

        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--text); color: #fff; padding: 9px 20px; border-radius: 13px;
            font-size: 0.82rem; font-weight: 600; z-index: 99999; opacity: 0;
            transition: opacity 0.2s ease; pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="sidebar-left">
        <div class="nav-item active" id="navFriends" onclick="switchMode('friends')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Friends
        </div>
        <div class="nav-item" id="navPending" onclick="switchMode('pending')">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="17" y1="11" x2="23" y2="11"/></svg>
            Pending
        </div>
        <div class="content-area" id="friendsList">
            <div style="padding:20px;text-align:center;color:var(--text-light);font-size:0.9rem;font-weight:500;">Loading friends...</div>
        </div>
        <div class="user-profile">
            <div class="user-avatar" id="currentUserAvatar">U</div>
            <div>
                <div style="font-weight:700;color:var(--text);" id="currentUserName">User</div>
                <div class="user-status"><span class="status-dot"></span> online</div>
            </div>
        </div>
    </div>

    <div class="chat-panel">
        <div class="chat-header" id="chatHeader">
            <span class="chat-header-name">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Friends
            </span>
        </div>

        <div id="addFriendZone" style="display:block;">
            <div class="add-friend-area">
                <div class="add-friend-title">Add a Friend</div>
                <div class="add-friend-subtitle">Connect with anyone who uses avocado chat</div>
                <div class="add-friend-input-container">
                    <input type="text" class="add-friend-input" id="friendInput" placeholder="Enter username..." autocomplete="off">
                    <button class="send-request-btn" onclick="addNewFriend()">Send friend request</button>
                </div>
                <div id="friendError" style="color:var(--red);font-size:12.5px;font-weight:600;margin-top:10px;display:none;"></div>
            </div>
        </div>

        <div id="chatZone" style="display:none;">
            <div class="chat-messages-container" id="messageContainer">
                <div style="text-align:center;color:var(--text-light);font-weight:500;margin-top:20px;">No messages yet. Say hi!</div>
            </div>
            <div id="mentionDropdown" class="mention-dropdown" style="display:none;"></div>
            <div class="chat-input-area">
                <div class="message-input-wrap" id="messageInputWrap">
                    <button type="button" class="expand-toggle" id="expandToggle">See more</button>
                    <textarea id="messageInput" rows="1" placeholder="Type a message... use @ to mention" autocomplete="off" autocorrect="off" spellcheck="true"></textarea>
                </div>
                <button class="chat-send-btn" onclick="sendMessage()">Send</button>
            </div>
        </div>

        <div id="pendingZone" style="display:none;flex-direction:column;padding:20px;align-items:center;justify-content:center;color:var(--text-light);">
            <h3 style="margin-bottom:10px;color:var(--text);font-weight:800;letter-spacing:-0.3px;">Friend Requests</h3>
            <div id="pendingList" style="width:100%;max-width:400px;"></div>
        </div>
    </div>

    <div class="sidebar-right">
        <div class="sidebar-right-title">friends online</div>
        <div id="onlineFriendsList">
            <div class="no-friends-card">
                <h4>Its so quiet here</h4>
                <p>I can even hear grasshopper chirping</p>
            </div>
        </div>
    </div>
</div>

<div id="ctxMenu" class="ctx-menu" style="display:none;"></div>
<div id="toast" class="toast"></div>

<script>
const ICONS = {
    copy: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
    </svg>`,
    trash: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
    </svg>`,
    clock: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>`,
    eye: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
    </svg>`,
    eyeOff: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
        <line x1="1" y1="1" x2="23" y2="23"/>
    </svg>`,
    chevronRight: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
    </svg>`,
    checkSingle: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 6L9 17l-5-5" stroke="#C9C4B4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`,
    checkDouble: `<svg width="18" height="14" viewBox="0 0 28 14" fill="none" stroke="#58CC02" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 7 6 12 14 4"/>
        <polyline points="8 7 13 12 21 4"/>
    </svg>`,
    checkDoubleGrey: `<svg width="18" height="14" viewBox="0 0 28 14" fill="none" stroke="#C9C4B4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

function setupOneSignal() {

        try {
            await OneSignal.login(currentUserId);
            if (currentUserUsername) {

            if (OneSignal.Notifications.permission !== true) {
                await OneSignal.Notifications.requestPermission();
            }

function setupPresence() {
    presenceChannel = _supabase.channel('online-users', { config: { presence: { key: currentUserId } } });
    presenceChannel
        .on('presence', { event: 'sync' }, () => {
            onlineUserIds = new Set(Object.keys(presenceChannel.presenceState()));
            renderFriendsList(); renderOnlineSidebar(); updateChatHeader();
        })
        .on('presence', { event: 'join' }, ({ key }) => {
            onlineUserIds.add(key); renderFriendsList(); renderOnlineSidebar(); updateChatHeader();
        })
        .on('presence', { event: 'leave' }, ({ key }) => {
            onlineUserIds.delete(key); renderFriendsList(); renderOnlineSidebar(); updateChatHeader();
        })
        .subscribe(async (status) => {
            if (status === 'SUBSCRIBED') {
                await presenceChannel.track({ user_id: currentUserId, online_at: new Date().toISOString() });
            }
        });
}
function isOnline(userId) { return onlineUserIds.has(userId); }

function setupFriendsSubscription() {
    if (friendsSubscription) { _supabase.removeChannel(friendsSubscription); }

    friendsSubscription = _supabase
        .channel(`friends-for-${currentUserId}`)
        .on(
            'postgres_changes',
            { event: 'INSERT', schema: 'public', table: 'friends', filter: `friend_id=eq.${currentUserId}` },
            async (payload) => {
                const row = payload.new;
                if (row.status === 'accepted') {
                    await loadFriends();
                    showToast('A new friend appeared!');
                }
            }
        )
        .on(
            'postgres_changes',
            { event: 'UPDATE', schema: 'public', table: 'friends', filter: `user_id=eq.${currentUserId}` },
            async (payload) => {
                const row = payload.new;
                if (row.status === 'accepted') {
                    const alreadyInList = friends.some(f => f.id === row.friend_id);
                    if (!alreadyInList) {
                        await loadFriends();
                        showToast('Your friend request was accepted!');

                }
            }
        )
        .subscribe();
}

    const ids = fr.map(r => r.friend_id);
    const { data: profiles } = await _supabase.from('profiles').select('id, username').in('id', ids);

    const unreadMap = {};

async function addNewFriend() {

    const { data: targetUser } = await _supabase.from('profiles').select('id').eq('username', username).maybeSingle();
    if (!targetUser) { friendError.innerText = "User not found."; friendError.style.display = 'block'; return; }
    if (targetUser.id === currentUserId) { friendError.innerText = "You cannot add yourself."; friendError.style.display = 'block'; return; }
    const { data: existing } = await _supabase.from('friends').select('id').eq('user_id', currentUserId).eq('friend_id', targetUser.id).maybeSingle();
    if (existing) { friendError.innerText = "Friend already added."; friendError.style.display = 'block'; return; }
    const { error } = await _supabase.from('friends').insert({ user_id: currentUserId, friend_id: targetUser.id, status: 'pending' });
    if (error) { friendError.innerText = "Error adding friend."; friendError.style.display = 'block'; return; }
    friendInput.value = '';
    showToast("Friend request sent!");
}

async function respondToRequest(requesterId, status) {
    if (status === 'accepted') {
        const { error: updateError } = await _supabase
            .from('friends')
            .update({ status: 'accepted' })
            .eq('user_id', requesterId)
            .eq('friend_id', currentUserId);

        if (updateError) {
            console.error('Error accepting request:', updateError);
            showToast('Could not accept request');
            return;
        }

        const { error: insertError } = await _supabase
            .from('friends')
            .upsert(
                { user_id: currentUserId, friend_id: requesterId, status: 'accepted' },
                { onConflict: 'user_id,friend_id' }
            );

        if (insertError) {
            console.error('Error creating reciprocal friendship:', insertError);
        }

        await loadFriends();
        showToast('Friend added!');

    } else {
        await _supabase
            .from('friends')
            .update({ status: 'rejected' })
            .eq('user_id', requesterId)
            .eq('friend_id', currentUserId);
    }

    loadPendingRequests();
}

async function loadMessages(friendId) {
    messageContainer.innerHTML = '<div style="text-align:center;color:var(--text-light);font-weight:500;margin-top:20px;">Loading messages...</div>';
    const { data: messages, error } = await _supabase.from('messages').select('*')
        .or(`and(sender_id.eq.${currentUserId},receiver_id.eq.${friendId}),and(sender_id.eq.${friendId},receiver_id.eq.${currentUserId})`)
        .order('created_at', { ascending: true });
    if (error) { messageContainer.innerHTML = '<div style="text-align:center;color:var(--red);font-weight:600;">Error loading chat.</div>'; return; }

    const unseen = (messages || []).filter(m => m.sender_id === friendId && !m.seen_at);
    if (unseen.length > 0) {
        await _supabase.from('messages').update({ seen_at: new Date().toISOString() })
            .in('id', unseen.map(m => m.id));
        unseen.forEach(m => m.seen_at = new Date().toISOString());
    }

    messageContainer.innerHTML = '';
    if (!messages || messages.length === 0) {
        messageContainer.innerHTML = '<div style="text-align:center;color:var(--text-light);font-weight:500;margin-top:20px;">No messages yet. Say hi!</div>';
        return;
    }
    messages.forEach(msg => appendMessageToDOM(msg));
    messageContainer.scrollTop = messageContainer.scrollHeight;
}

function appendMessageToDOM(msg, prepend = false) {
    const isSent = msg.sender_id === currentUserId;
    const isSeen = !!msg.seen_at;

    const wrapper = document.createElement('div');
    wrapper.className = `message-wrapper ${isSent ? 'sent' : 'received'}`;
    wrapper.dataset.msgId = msg.id || '';
    wrapper.dataset.isSent = isSent ? '1' : '0';
    wrapper.dataset.seen = isSeen ? '1' : '0';
    wrapper.dataset.content = msg.content;

    const msgDiv = document.createElement('div');
    msgDiv.className = 'message';

    const otherId = isSent ? msg.receiver_id : msg.sender_id;
    const otherFriend = friends.find(f => f.id === otherId);
    const mentionableNames = [currentUserUsername, otherFriend ? otherFriend.name : null];
    msgDiv.innerHTML = highlightMentions(msg.content, mentionableNames);

    if (isSent) {
        msgDiv.addEventListener('contextmenu', (e) => { e.preventDefault(); showCtxMenu(e, wrapper); });
        msgDiv.addEventListener('click', (e) => { showCtxMenu(e, wrapper); });
    }

    wrapper.appendChild(msgDiv);

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    const ts = document.createElement('span');
    ts.className = 'timestamp';
    ts.innerText = new Date(msg.created_at || Date.now()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    meta.appendChild(ts);

    if (isSent) {
        const tick = document.createElement('span');
        tick.className = 'seen-tick';
        tick.innerHTML = isSeen ? ICONS.checkDouble : ICONS.checkDoubleGrey;
        tick.title = isSeen ? 'Seen' : 'Delivered';
        meta.appendChild(tick);
    }

    wrapper.appendChild(meta);

    if (prepend) { messageContainer.insertBefore(wrapper, messageContainer.firstChild); }
    else { messageContainer.appendChild(wrapper); }
}

function showCtxMenu(e, wrapper) {
    e.stopPropagation();
    closeCtxMenu();

    const msgId  = wrapper.dataset.msgId;
    const isSeen = wrapper.dataset.seen === '1';
    const content = wrapper.dataset.content;

    ctxMenu.innerHTML = `
        <div class="ctx-item" id="ctx-copy">${ICONS.copy} Copy</div>
        <div class="ctx-divider"></div>
        <div class="ctx-item danger" id="ctx-delete">${ICONS.trash} Delete</div>
        <div class="ctx-item danger ${isSeen ? 'disabled' : ''}" id="ctx-delete-viewed" title="${isSeen ? 'Already seen by recipient' : 'Delete when recipient views it'}">
            ${isSeen ? ICONS.eyeOff : ICONS.eye} Delete after viewed ${isSeen ? '<span style="font-size:0.75rem;color:#C9C4B4;margin-left:4px;">(already seen)</span>' : ''}
        </div>
        <div class="ctx-submenu-wrap">
            <div class="ctx-item danger" id="ctx-delete-timer">
                ${ICONS.clock} Delete after…<span class="ctx-arrow">${ICONS.chevronRight}</span>
            </div>
            <div class="ctx-submenu" id="ctx-submenu">
                <div class="ctx-item danger" onclick="scheduleDelete('${msgId}', 5)">${ICONS.clock} 5 minutes</div>
                <div class="ctx-item danger" onclick="scheduleDelete('${msgId}', 10)">${ICONS.clock} 10 minutes</div>
                <div class="ctx-item danger" onclick="scheduleDelete('${msgId}', 15)">${ICONS.clock} 15 minutes</div>
            </div>
        </div>`;

    ctxMenu.querySelector('#ctx-copy').onclick = () => { navigator.clipboard.writeText(content); showToast('Copied!'); closeCtxMenu(); };
    ctxMenu.querySelector('#ctx-delete').onclick = () => { deleteMessage(msgId); closeCtxMenu(); };
    if (!isSeen) {
        ctxMenu.querySelector('#ctx-delete-viewed').onclick = () => { registerDeleteOnView(msgId); showToast('Will delete when seen'); closeCtxMenu(); };
    }

    const x = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 200);
    const y = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 200);
    ctxMenu.style.display = 'block';
    const mw = ctxMenu.offsetWidth || 200;
    const mh = ctxMenu.offsetHeight || 160;
    ctxMenu.style.left = (x + mw > window.innerWidth ? x - mw : x) + 'px';
    ctxMenu.style.top  = (y + mh > window.innerHeight ? y - mh : y) + 'px';
}

function closeCtxMenu() { ctxMenu.style.display = 'none'; ctxMenu.innerHTML = ''; }
document.addEventListener('click', closeCtxMenu);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeCtxMenu(); });

async function deleteMessage(msgId) {
    if (!msgId) return;
    const wrapper = document.querySelector(`[data-msg-id="${msgId}"]`);
    if (wrapper) { wrapper.querySelector('.message').classList.add('deleting'); }
    if (deleteTimers[msgId]) { clearTimeout(deleteTimers[msgId]); delete deleteTimers[msgId]; }
    const { error } = await _supabase.from('messages').delete().eq('id', msgId).eq('sender_id', currentUserId);
    if (error) { console.error('Delete error', error); showToast('Could not delete'); if (wrapper) wrapper.querySelector('.message').classList.remove('deleting'); return; }
    if (wrapper) wrapper.remove();
    showToast('Message deleted');
}

function scheduleDelete(msgId, minutes) {
    closeCtxMenu();
    if (!msgId) return;
    if (deleteTimers[msgId]) { clearTimeout(deleteTimers[msgId]); }
    deleteTimers[msgId] = setTimeout(() => deleteMessage(msgId), minutes * 60 * 1000);
    showToast(`Will delete in ${minutes} min`);
}

function registerDeleteOnView(msgId) {
    if (!msgId) return;
    deleteOnViewSet.add(msgId);
}

function subscribeToNewMessages(friendId) {
    const channelName = `chat-${[currentUserId, friendId].sort().join('-')}`;
    messageSubscription = _supabase.channel(channelName)
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, async (payload) => {
            const msg = payload.new;
            const relevant = (
                (msg.sender_id === currentUserId && msg.receiver_id === friendId) ||
                (msg.sender_id === friendId && msg.receiver_id === currentUserId)
            );
            if (!relevant || msg.sender_id === currentUserId) return;

            if (currentChatId === friendId) {
                await _supabase.from('messages').update({ seen_at: new Date().toISOString() }).eq('id', msg.id);
                msg.seen_at = new Date().toISOString();
                appendMessageToDOM(msg);
                messageContainer.scrollTop = messageContainer.scrollHeight;
            } else {
                const f = friends.find(x => x.id === friendId);
                if (f) { f.unread += 1; f.lastMsg = msg.content; f.lastSender = msg.sender_id; renderFriendsList(); }
            }
        })
        .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'messages' }, (payload) => {
            const msg = payload.new;
            if (msg.sender_id === currentUserId && msg.seen_at) {
                const wrapper = document.querySelector(`[data-msg-id="${msg.id}"]`);
                if (wrapper) {
                    wrapper.dataset.seen = '1';
                    const tick = wrapper.querySelector('.seen-tick');
                    if (tick) { tick.innerHTML = ICONS.checkDouble; tick.title = 'Seen'; }
                }
                if (deleteOnViewSet.has(msg.id)) { deleteOnViewSet.delete(msg.id); deleteMessage(msg.id); }
            }
        })
        .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'messages' }, (payload) => {
            const wrapper = document.querySelector(`[data-msg-id="${payload.old.id}"]`);
            if (wrapper) wrapper.remove();
        })
        .subscribe();
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.innerText = str;
    return div.innerHTML;
}

function escapeRegExp(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function getMentionableUsers() {
    const friend = friends.find(f => f.id === currentChatId);
    return friend ? [friend] : [];
}

function updateMentionDropdown() {
    const cursorPos = messageInput.selectionStart;
    const textBeforeCursor = messageInput.value.slice(0, cursorPos);
    const atIndex = textBeforeCursor.lastIndexOf('@');

    if (atIndex === -1) { closeMentionDropdown(); return; }

    const charBefore = atIndex === 0 ? ' ' : textBeforeCursor[atIndex - 1];
    if (!/\s/.test(charBefore)) { closeMentionDropdown(); return; }

    const query = textBeforeCursor.slice(atIndex + 1);
    if (/\s/.test(query)) { closeMentionDropdown(); return; }

    const candidates = getMentionableUsers().filter(f =>
        f.name.toLowerCase().startsWith(query.toLowerCase())
    );

    if (candidates.length === 0) { closeMentionDropdown(); return; }

    mentionTriggerPos = atIndex;
    mentionMatches = candidates;
    mentionActiveIndex = 0;
    renderMentionDropdown();
}

function renderMentionDropdown() {
    mentionDropdown.innerHTML = `<div class="mention-dropdown-label">Mention</div>`;
    mentionMatches.forEach((f, i) => {
        const item = document.createElement('div');
        item.className = 'mention-dropdown-item' + (i === mentionActiveIndex ? ' active' : '');
        item.innerHTML = `
            <div class="mention-dropdown-avatar">${f.name.charAt(0).toUpperCase()}</div>
            <div class="mention-dropdown-name">${f.name}</div>
            <div class="mention-dropdown-hint">↵ select</div>`;
        item.onclick = () => selectMention(f);
        mentionDropdown.appendChild(item);
    });
    mentionDropdown.style.display = 'block';
}

function closeMentionDropdown() {
    mentionDropdown.style.display = 'none';
    mentionDropdown.innerHTML = '';
    mentionMatches = [];
    mentionActiveIndex = 0;
    mentionTriggerPos = -1;
}

function selectMention(friend) {
    const cursorPos = messageInput.selectionStart;
    const before = messageInput.value.slice(0, mentionTriggerPos);
    const after = messageInput.value.slice(cursorPos);
    const insertion = `@${friend.name} `;
    messageInput.value = before + insertion + after;
    const newCursor = (before + insertion).length;
    messageInput.focus();
    messageInput.setSelectionRange(newCursor, newCursor);
    closeMentionDropdown();
    autoResizeInput();
}

function highlightMentions(rawContent, mentionableNames) {
    let escaped = escapeHtml(rawContent);
    mentionableNames.forEach(name => {
        if (!name) return;
        const safeName = escapeHtml(name);
        const regex = new RegExp(`@${escapeRegExp(safeName)}\\b`, 'gi');
        escaped = escaped.replace(regex, `<span class="mention-pill">@${safeName}</span>`);
    });
    return escaped;
}

// ================================================================
// MULTI-LINE INPUT — auto-resize + expand/collapse
// ================================================================
function autoResizeInput() {
    messageInput.style.height = 'auto';
    const scrollHeight = messageInput.scrollHeight;
    const cap = inputExpanded ? INPUT_EXPANDED_MAX : INPUT_COLLAPSED_MAX;
    const newHeight = Math.max(INPUT_MIN_HEIGHT, Math.min(scrollHeight, cap));
    messageInput.style.height = newHeight + 'px';
    messageInput.style.overflowY = scrollHeight > cap ? 'auto' : 'hidden';

    if (inputExpanded) {
        expandToggle.style.display = 'block';
        expandToggle.textContent = 'See less';
    } else if (scrollHeight > INPUT_COLLAPSED_MAX) {
        expandToggle.style.display = 'block';
        expandToggle.textContent = 'See more';
    } else {
        expandToggle.style.display = 'none';
    }
}

function resetInputHeight() {
    inputExpanded = false;
    messageInput.style.height = INPUT_MIN_HEIGHT + 'px';
    messageInput.style.overflowY = 'hidden';
    expandToggle.style.display = 'none';
    expandToggle.textContent = 'See more';
}

expandToggle.addEventListener('click', () => {
    inputExpanded = !inputExpanded;
    autoResizeInput();
    messageInput.focus();
});

messageInput.addEventListener('input', () => {
    autoResizeInput();
    updateMentionDropdown();
});

messageInput.addEventListener('keydown', (e) => {
    if (mentionDropdown.style.display === 'block' && mentionMatches.length > 0) {
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            mentionActiveIndex = (mentionActiveIndex + 1) % mentionMatches.length;
            renderMentionDropdown();
            return;
        }
        if (e.key === 'ArrowUp') {
            e.preventDefault();
            mentionActiveIndex = (mentionActiveIndex - 1 + mentionMatches.length) % mentionMatches.length;
            renderMentionDropdown();
            return;
        }
        if (e.key === 'Enter' || e.key === 'Tab') {
            e.preventDefault();
            selectMention(mentionMatches[mentionActiveIndex]);
            return;
        }
        if (e.key === 'Escape') {
            e.preventDefault();
            closeMentionDropdown();
            return;
        }
    }

    // Enter sends; Shift+Enter inserts a new line (default textarea behavior).
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

document.addEventListener('click', (e) => {
    if (!mentionDropdown.contains(e.target) && e.target !== messageInput) {
        closeMentionDropdown();
    }
});

async function sendMessage() {
    if (!currentChatId) return;
    const text = messageInput.value.trim();
    if (!text) return;

    const tempId = 'temp_' + Date.now();
    const optimistic = { id: tempId, sender_id: currentUserId, receiver_id: currentChatId, content: text, created_at: new Date().toISOString(), seen_at: null };
    appendMessageToDOM(optimistic);
    messageContainer.scrollTop = messageContainer.scrollHeight;
    messageInput.value = '';
    resetInputHeight();
    closeMentionDropdown();

    const friend = friends.find(f => f.id === currentChatId);
    if (friend) { friend.lastMsg = text; friend.lastSender = currentUserId; renderFriendsList(); }

    const { data, error } = await _supabase.from('messages').insert({ sender_id: currentUserId, receiver_id: currentChatId, content: text }).select().single();
    if (error) { console.error(error); showToast('Failed to send'); return; }

    const wrapper = document.querySelector(`[data-msg-id="${tempId}"]`);
    if (wrapper && data) { wrapper.dataset.msgId = data.id; }
}

document.addEventListener('DOMContentLoaded', checkAuthAndLoad);
</script>
