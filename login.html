<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Avocado Chat • Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #e0e0dc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Topbar (same as index) ── */
    .topbar {
      padding: 18px 24px;
      display: flex;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      text-decoration: none;
    }

    .logo img {
      width: 26px;
      height: 26px;
      object-fit: contain;
    }

    /* ── Main content ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      gap: 14px;
    }

    .lock-icon {
      width: 24px;
      height: 24px;
      object-fit: contain;
      margin-bottom: 2px;
    }

    .tagline {
      font-size: 12px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #666;
      font-weight: 500;
    }

    .hero-title {
      font-size: 30px;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
      letter-spacing: -0.3px;
    }

    .hero-sub {
      font-size: 13.5px;
      color: #666;
      text-align: center;
      max-width: 270px;
      line-height: 1.6;
    }

    /* ── Form card ── */
    .form-card {
      width: 100%;
      max-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    .form-label {
      font-size: 14px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      height: 48px;
      border-radius: 13px;
      border: 1.5px solid #bbb;
      background-color: white;
      padding: 0 14px;
      font-size: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 14px;
    }

    input:focus {
      border-color: #5aa65a;
      background-color: #fff;
    }

    /* ── Buttons (same as index) ── */
    .btn-primary {
      width: 100%;
      padding: 13px 0;
      background-color: #5aa65a;
      color: white;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 13px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: block;
      transition: background 0.2s;
    }

    .btn-primary:hover {
      background-color: #4a934a;
    }

    .bottom-text {
      margin-top: 6px;
      font-size: 13px;
      color: #666;
      text-align: center;
    }

    .bottom-text a {
      color: #5aa65a;
      text-decoration: none;
      font-weight: 600;
    }

    .bottom-text a:hover {
      text-decoration: underline;
    }

    /* ── Loading overlay (same as index) ── */
    #loading-screen {
      display: none;
      position: fixed;
      inset: 0;
      background-color: #e0e0dc;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 999;
      gap: 16px;
    }

    #loading-screen.active {
      display: flex;
    }

    #lottie-container {
      width: 200px;
      height: 200px;
    }

    .loading-label {
      font-size: 12px;
      color: #666;
      letter-spacing: 0.05em;
      font-weight: 500;
    }

    .loading-dots span {
      display: inline-block;
      animation: blink 1.2s infinite;
      font-size: 12px;
      color: #5aa65a;
      margin: 0 2px;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); }
    }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading-screen">
    <div id="lottie-container"></div>
    <p class="loading-label">Loading</p>
    <div class="loading-dots">
      <span>●</span><span>●</span><span>●</span>
    </div>
  </div>

  <!-- Top bar -->
  <div class="topbar">
    <a href="index.html" class="logo">
      <img src="avocado.svg" alt="Avocado Chat logo" />
      avocado chat
    </a>
  </div>

  <!-- Main -->
  <main class="main">
    <img src="Lock.svg" alt="End to end encryption" class="lock-icon" />
    <p class="tagline">Private &amp; Secure Messaging</p>
    <h1 class="hero-title">Welcome Back</h1>
    <p class="hero-sub">soo excited to see you again!</p>

    <div class="form-card">
      <label class="form-label" for="loginInput">Username or Email</label>
      <input type="text" id="loginInput" placeholder="you@example.com" autocomplete="off" />

      <button class="btn-primary" id="loginBtn">Log in</button>

      <div class="bottom-text">
        Need an account? <a href="signup.html">Create one</a>
      </div>
    </div>
  </main>

    function showLoading(url) {
      destination = url;
      var screen = document.getElementById('loading-screen');
      screen.classList.add('active');

      if (!anim) {
        anim = lottie.loadAnimation({
          container: document.getElementById('lottie-container'),
          renderer: 'svg',
          loop: true,
          autoplay: true,
          animationData: LOTTIE_DATA
        });
      } else {
        anim.play();
      }

      setTimeout(function() {
        window.location.href = destination;
      }, 2200);
    }

    document.getElementById('loginBtn').addEventListener('click', function() {
      var input = document.getElementById('loginInput').value.trim();
      if (input === '') {
        alert('Please enter your username or email.');
        return;
      }
      showLoading('getstarted.html');
    });

    document.getElementById('loginInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('loginBtn').click();
      }
    });
  </script>
</body>
</html>
